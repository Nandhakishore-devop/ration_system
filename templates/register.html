<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Registration - Smart Ration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="brand">
                <div class="brand-icon">
                    <i data-lucide="gem" color="white" size="24"></i>
                </div>
                <span>SMART RATION</span>
            </div>

            <nav>
                <a href="/">Dashboard</a>
                <a href="/register" class="active">New Registration</a>
                <a href="/customers">Customer Details</a>
            </nav>

            <div class="header-actions">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: #ccc;"></div>
            </div>
        </header>

        <main style="display: flex; justify-content: center; padding-top: 4rem;">
            <div class="card" style="width: 100%; max-width: 500px; padding: 3rem;">
                <div style="text-align: center; margin-bottom: 2.5rem;">
                    <div
                        style="width: 64px; height: 64px; background: rgba(55, 114, 255, 0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                        <i data-lucide="user-plus" size="32" color="var(--accent)"></i>
                    </div>
                    <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Beneficiary Registration</h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Add a new phone number to receive real-time
                        ration alerts.</p>
                </div>

                <form method="POST" action="/register">
                    <div style="margin-bottom: 1.5rem;">
                        <label
                            style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 0.5rem;">Full
                            Name</label>
                        <input type="text" name="name" required placeholder="e.g. Nandha Kishore"
                            style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 1rem; border-radius: 12px; color: white; outline: none; transition: border-color 0.3s;">
                    </div>

                    <div style="margin-bottom: 2.5rem;">
                        <label
                            style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 0.5rem;">Phone
                            Number</label>
                        <input type="tel" name="phone" required placeholder="e.g. +91 999 000 1234"
                            style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 1rem; border-radius: 12px; color: white; outline: none; transition: border-color 0.3s;">
                    </div>

                    <button type="submit" class="btn-panel"
                        style="width: 100%; background: var(--accent); color: white; border: none; justify-content: center; padding: 1rem;">
                        Register Beneficiary <i data-lucide="arrow-right" size="18"></i>
                    </button>
                </form>

                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
                    By registering, the user agrees to receive automated SMS notifications from the Smart Ration System.
                </p>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        document.querySelectorAll('input').forEach(input => {
            input.onfocus = () => input.style.borderColor = 'var(--accent)';
            input.onblur = () => input.style.borderColor = 'var(--border)';
        });
    </script>
</body>

</html>
